<p-floatlabel>
    <p-inputgroup>
        <input pInputText [ngModel]="model()?.nombre" fluid id="TboxNombre" readonly/>
        <p-inputgroup-addon>
            <i class="pi pi-search" (click)="modalBuscarVia($event)"></i>
        </p-inputgroup-addon>
        <p-inputgroup-addon>
            <i class="pi pi-times" (click)="quitarVia($event)"></i>
        </p-inputgroup-addon>
    </p-inputgroup>
    
    <label for="TboxNombre">{{placeholder}}</label>
</p-floatlabel>
