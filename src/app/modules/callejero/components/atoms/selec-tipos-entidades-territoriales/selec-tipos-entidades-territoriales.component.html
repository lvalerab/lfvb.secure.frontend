@if(multiple) {
    <p-multiselect [id]="id??'slem'" [options]="tipos" optionLabel="nombre" [ngModel]="seleccionMultiple" (ngModelChange)="OnCuandoCambiaModeloMultiple($event)"></p-multiselect>
} 
@else {
    <p-select [id]="id??'sles'" [options]="tipos" optionLabel="nombre" [ngModel]="seleccion" (ngModelChange)="OnCuandoCambiaModelo($event)"></p-select>
}
