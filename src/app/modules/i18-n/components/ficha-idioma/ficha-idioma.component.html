<p-card>
    <ng-template #header>

    </ng-template>
    <ng-template #title>
        Ficha del idioma {{idioma.nombre}}
    </ng-template>
    <ng-template #subtitle>
        <p-menubar [model]="menus"></p-menubar>
    </ng-template>
    <br/>
    <p-floatlabel>
        <input id="TBoxCodigo" pInputText fluid [(ngModel)]="idioma.codigo" [disabled]="!nuevo"/>
        <label for="TBoxCodigo">Código</label>
    </p-floatlabel>
    <br/>
    <p-floatlabel>
        <input id="TBoxNombre" pInputText fluid [(ngModel)]="idioma.nombre"/>
        <label for="TBoxNombre">Nombre</label>
    </p-floatlabel>    
    <p-togglebutton [(ngModel)]="idioma.multiple" onLabel="Compuesto" offLabel="Simple" [onIcon]="'pi pi-clone'" offIcon="pi pi-receipt"></p-togglebutton>
    <p-divider></p-divider>
    <p-tabs value="0">
        <p-tablist>
            <p-tab value="0" [disabled]="!idioma.multiple">Columnas de idioma (Idioma multiple)</p-tab>
            <p-tab value="1">Propiedades</p-tab>
        </p-tablist>
        <p-tabpanels>
            <p-tabpanel value="0">
                @if(idioma.multiple) {                    
                    <br/>
                    <p-floatlabel>
                        <p-select id="SlcIdioma1" fluid [options]="idiomas" optionLabel="nombre" [(ngModel)]="idioma1"></p-select>
                        <label for="SlcIdioma1">1º Columna</label>
                    </p-floatlabel>
            
                    <br/>
                    <p-floatlabel>
                        <p-select id="SlcIdioma2" fluid [options]="idiomas" optionLabel="nombre" [(ngModel)]="idioma2"></p-select>
                        <label for="SlcIdioma2">2º Columna</label>
                    </p-floatlabel>
                }
                @else {
                    <p-message severity="info">Debe seleccionar idioma multiple para configurar las columnas por idioma</p-message>
                }
            </p-tabpanel>
            <p-tabpanel value="1">
                <p-splitter [panelSizes]="[25, 75]" [style]="{ height: '500px' }" styleClass="mb-8">
                    <ng-template #panel>
                        <p-scrollpanel [style]="{width:'100%' ,height:'500px'}">
                            <app-arbol-selector-propiedades-component (PropiedadSeleccionada)="CuandoSeleccionaPropiedad($event)" FiltroTipoElemento="idio"></app-arbol-selector-propiedades-component>
                        </p-scrollpanel>
                    </ng-template>
                    <ng-template #panel>
                        <app-panel-propiedad-elemento-component [elemento]="{id:ident+'',etiqueta:'Propiedades del idioma',tipo:'Idioma'}" [propiedad]="PropiedadSeleccionada()"></app-panel-propiedad-elemento-component>
                    </ng-template>
                </p-splitter>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
    
</p-card>
